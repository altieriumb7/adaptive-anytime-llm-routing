name: reviewer-checks

on:
  push:
  pull_request:

jobs:
  minimal-repro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install lightweight deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.paper.txt pyyaml
      - name: Python compile check
        run: python -m compileall scripts src
      - name: Minimal reviewer reproduction
        run: bash reproduce_minimal.sh
